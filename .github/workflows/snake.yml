name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔥 VERY IMPORTANT (fixes exit code 128)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Soumyacode1-prog
          outputs: |
            dist/github-snake-dark.svg

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4   # ✅ UPDATED ACTION
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
